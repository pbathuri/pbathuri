name: Metrics
on:
  # Rebuild every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ── Core overview: commits, issues, PRs, followers, languages, activity calendar
      - name: Metrics — main panel
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: pbathuri
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Indiana/Indianapolis
          config_order: base.header, base.activity, base.community, base.repositories, base.metadata, plugin_languages
          plugin_languages: yes
          plugin_languages_ignored: html, tex, less, dockerfile, makefile, shell
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: no    # indepth clones every repo and errors on the fallback GITHUB_TOKEN; set METRICS_TOKEN (a PAT) as a repo secret to re-enable
          plugin_languages_limit: 8
          # plugin_habits needs a PAT; it renders an "Unexpected error" panel on the fallback GITHUB_TOKEN.
          # Disabled to keep the metrics clean. Set a METRICS_TOKEN repo secret, then flip this back to `yes`
          # (and re-add `plugin_habits` to config_order above) to restore the recent-coding-habits panel.
          plugin_habits: no

      # ── Isometric calendar — the big colourful 3D contribution graph
      - name: Metrics — isometric calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: pbathuri
          base: ""
          config_timezone: America/Indiana/Indianapolis
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── Topics plugin — top repo topics as a cloud
      - name: Metrics — topics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.topics.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: pbathuri
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          plugin_topics_sort: activity
