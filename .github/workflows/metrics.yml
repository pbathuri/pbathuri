name: Metrics
on:
  # Rebuild every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # ── Core overview: commits, issues, PRs, followers, languages, activity calendar
      - name: Metrics — main panel
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: pbathuri
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Indiana/Indianapolis
          config_order: base.header, base.activity, base.community, base.repositories, base.metadata, plugin_languages, plugin_habits
          plugin_languages: yes
          plugin_languages_ignored: html, tex, less, dockerfile, makefile, shell
          plugin_languages_details: bytes-size, percentage
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes

      # ── Isometric calendar — the big colourful 3D contribution graph
      - name: Metrics — isometric calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: pbathuri
          base: ""
          config_timezone: America/Indiana/Indianapolis
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

      # ── Topics plugin — top repo topics as a cloud
      - name: Metrics — topics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics.plugin.topics.svg
          token: ${{ secrets.METRICS_TOKEN || secrets.GITHUB_TOKEN }}
          user: pbathuri
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 15
          plugin_topics_sort: activity
